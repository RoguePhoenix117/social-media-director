services:
  postgres:
    image: postgres:18
    container_name: social-media-director-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: social_media_director
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social_media_director"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
